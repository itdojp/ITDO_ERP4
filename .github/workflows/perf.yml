name: Performance

on:
  workflow_dispatch:
    inputs:
      runLabel:
        description: "Label for this run (stored in artifacts)"
        required: false
        default: "manual"
  schedule:
    - cron: "0 19 * * 1"

jobs:
  api-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: docker.io/library/postgres:15@sha256:6ab12ad4395ee49ab49fe19530f7e183c5a9c97fc47cf687b3e281bec5f91ee4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
      - run: sudo apt-get update
      - run: sudo apt-get install -y postgresql-client
      - name: Run api bench
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          OUT_DIR: tmp/perf-ci
          RUN_LABEL: ${{ inputs.runLabel || 'scheduled' }}
        run: ./scripts/perf/run-api-bench-ci.sh
      - name: Compare with baseline (non-blocking)
        continue-on-error: true
        run: |
          if [[ -f docs/performance/perf-baseline.json ]]; then
            node ./scripts/perf/compare-api-bench.mjs --base docs/performance/perf-baseline.json --next tmp/perf-ci/result.json
          else
            echo "baseline not found; skipping comparison"
          fi
      - name: Upload perf artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: perf-api-bench-${{ github.run_id }}
          path: tmp/perf-ci/*
          if-no-files-found: error
          retention-days: 90

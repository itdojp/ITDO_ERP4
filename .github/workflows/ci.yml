name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 18 * * *"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci
        working-directory: packages/backend
      - run: npx prisma generate --config ./prisma.config.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - run: npm run build
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - run: npm run test:ci
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - run: npm run coverage:integrations:check
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - run: npx prisma format --config ./prisma.config.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - run: npx prisma validate --config ./prisma.config.ts
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
  coverage-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci --prefix packages/backend
      - run: npm run coverage:auth:check --prefix packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix packages/frontend
      - name: Typecheck frontend
        run: npm run typecheck --prefix packages/frontend
      - name: Test frontend
        run: npm run test --prefix packages/frontend
      - name: Build frontend
        run: npm run build --prefix packages/frontend
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci --prefix packages/backend
      - run: npm run lint --prefix packages/backend
      - run: npm run format:check --prefix packages/backend
      - run: npm run arch:bounded-context --prefix packages/backend
      - run: ./scripts/check-ops-docs.sh
      - run: ./scripts/check-ops-scripts.sh
      - run: npm ci --prefix packages/frontend
      - run: npm run lint --prefix packages/frontend
      - run: npm run format:check --prefix packages/frontend
      - run: node scripts/check-doc-image-links.mjs
      - run: make docs-test-results-index-check
      - run: make production-readiness-external-evidence-test
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci --prefix packages/backend
      - run: npm ci --prefix packages/frontend
      - name: Generate SBOM (CycloneDX)
        run: ./scripts/export-sbom.sh --out tmp/sbom
      - name: Generate SBOM checksums
        run: sha256sum tmp/sbom/*.cdx.json > tmp/sbom/SHA256SUMS
      - name: Attest SBOM artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-checksums: tmp/sbom/SHA256SUMS
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-${{ github.sha }}
          path: |
            tmp/sbom/*.cdx.json
            tmp/sbom/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
      - name: Backend audit (high/critical)
        run: npm audit --prefix packages/backend --audit-level=high
      - name: Frontend audit (high/critical)
        run: npm audit --prefix packages/frontend --audit-level=high
  data-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci --prefix packages/backend
      - name: Test data quality runner
        run: npm run data-quality:test --prefix packages/backend
      - name: Run blocking data quality checks
        run: npm run data-quality:blocking --prefix packages/backend
      - name: Run advisory data quality checks
        run: npm run data-quality:advisory --prefix packages/backend
      - name: Publish data quality summary
        if: always()
        run: |
          for file in tmp/data-quality-*.md; do
            if [ -f "$file" ]; then
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
              printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
      - name: Upload data quality reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: data-quality-${{ github.run_id }}-${{ github.sha }}
          path: |
            tmp/data-quality-*.json
            tmp/data-quality-*.md
          if-no-files-found: error
          retention-days: 14
  e2e-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    services:
      postgres:
        image: docker.io/library/postgres:15@sha256:6ab12ad4395ee49ab49fe19530f7e183c5a9c97fc47cf687b3e281bec5f91ee4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci --prefix packages/backend
      - run: npm ci --prefix packages/frontend
      - run: sudo apt-get update
      - run: sudo apt-get install -y postgresql-client
      - run: npx --prefix packages/frontend playwright install --with-deps chromium
      - name: Run frontend e2e
        env:
          E2E_DB_MODE: direct
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          E2E_API_BASE: http://127.0.0.1:3002
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_CAPTURE: 0
          E2E_TRACE_ON_FAILURE: 1
          E2E_SKIP_PLAYWRIGHT_INSTALL: 1
          E2E_SCOPE: ${{ github.event_name == 'pull_request' && 'core' || 'full' }}
        run: ./scripts/e2e-frontend.sh
      - name: Upload e2e diagnostics (failure only)
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-failure-${{ github.run_id }}-${{ github.sha }}
          path: |
            tmp/e2e-backend.log
            tmp/e2e-frontend.log
            packages/frontend/test-results/**/*
          if-no-files-found: warn
          retention-days: 14

  api-schema:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            packages/backend/package-lock.json
            packages/frontend/package-lock.json
      - run: npm ci --prefix packages/backend
      - run: npx --prefix packages/backend prisma generate --config packages/backend/prisma.config.ts
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - run: npm run build --prefix packages/backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - name: Generate OpenAPI
        run: node scripts/export-openapi.mjs --out tmp/openapi.json
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres?schema=public
      - name: Ensure OpenAPI snapshot is up to date
        run: diff -u docs/api/openapi.json tmp/openapi.json
      - name: Breaking change check (openapi-diff)
        run: |
          git fetch origin "${GITHUB_BASE_REF}" --depth=1
          if git show "origin/${GITHUB_BASE_REF}:docs/api/openapi.json" > tmp/openapi-base.json 2>/dev/null; then
            if grep -q '"type": "null"' tmp/openapi-base.json || grep -Eq '"exclusive(Minimum|Maximum)"[[:space:]]*:[[:space:]]*[0-9]+' tmp/openapi-base.json; then
              echo "base openapi is not OpenAPI 3.0 compatible -> skipping openapi-diff"
              exit 0
            fi
            npx --prefix packages/backend openapi-diff tmp/openapi-base.json tmp/openapi.json
          else
            echo "base openapi not found; skipping breaking change check"
          fi

  secret-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Basic secret scan (blocking)
        run: ./scripts/secret-scan.sh
        env:
          SECRET_SCAN_REPORT_PATH: tmp/secret-scan-report.tsv
      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: secret-scan-${{ github.run_id }}-${{ github.sha }}
          path: tmp/secret-scan-report.tsv
          if-no-files-found: warn
          retention-days: 14

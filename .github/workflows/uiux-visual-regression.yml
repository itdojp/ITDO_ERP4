name: UIUX Visual Regression

on:
  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: docker.io/library/postgres:15@sha256:6ab12ad4395ee49ab49fe19530f7e183c5a9c97fc47cf687b3e281bec5f91ee4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.19.0
      - run: npm ci --prefix packages/backend
      - run: npm ci --prefix packages/frontend
      - run: sudo apt-get update
      - run: sudo apt-get install -y postgresql-client
      - run: npx --prefix packages/frontend playwright install --with-deps chromium
      - name: Run UIUX visual regression
        env:
          E2E_DB_MODE: direct
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          E2E_API_BASE: http://127.0.0.1:3002
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_CAPTURE: 0
          E2E_TRACE_ON_FAILURE: 1
          E2E_SKIP_PLAYWRIGHT_INSTALL: 1
        run: ./scripts/e2e-uiux-visual-regression.sh
      - name: Upload visual regression diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: uiux-visual-regression-${{ github.run_id }}-${{ github.sha }}
          path: |
            tmp/e2e-backend.log
            tmp/e2e-frontend.log
            packages/frontend/test-results/**/*
          if-no-files-found: warn
          retention-days: 30
